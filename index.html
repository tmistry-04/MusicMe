<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicMe</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --card: #1a1a1a;
        --pink: #ff2d78;
        --purple: #9b4dff;
        --text: #ffffff;
        --muted: #888888;
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
    }

    .hidden {
        display: none !important;
    }
        /* AUTH SCREEN */
    #auth-screen {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: radial-gradient(ellipse at top, #1a0a2e 0%, var(--bg) 60%);
    }

    .auth-container {
        width: 100%;
        max-width: 400px;
        padding: 2rem;
    }

    .logo {
        font-family: 'Syne', sans-serif;
        font-size: 2.2rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--pink), var(--purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
    }

    .tagline {
        color: var(--muted);
        margin-bottom: 2rem;
        font-size: 0.9rem;
    }

    .auth-tabs {
        display: flex;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid #333;
    }

    .tab {
        background: none;
        border: none;
        color: var(--muted);
        padding: 0.75rem 1.5rem;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        font-size: 1rem;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
    }

    .tab.active {
        color: var(--pink);
        border-bottom-color: var(--pink);
    }

    .input {
        width: 100%;
        background: var(--card);
        border: 1px solid #333;
        border-radius: 8px;
        padding: 0.875rem 1rem;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 1rem;
        margin-bottom: 1rem;
        outline: none;
        transition: border-color 0.2s;
    }

    .input:focus {
        border-color: var(--purple);
    }

    .btn-primary {
        width: 100%;
        background: linear-gradient(135deg, var(--pink), var(--purple));
        border: none;
        border-radius: 8px;
        padding: 0.875rem;
        color: white;
        font-family: 'Syne', sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    .btn-primary:hover {
        opacity: 0.9;
    }

    .error {
        color: var(--pink);
        font-size: 0.85rem;
        margin-top: 1rem;
        text-align: center;
    }
            .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.5rem 2rem;
        border-bottom: 1px solid #222;
    }

    .nav-logo {
        font-family: 'Syne', sans-serif;
        background: linear-gradient(135deg, var(--pink), var(--purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .nav-links button {
        background: none;
        border: 1px solid #333;
        color: var(--muted);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        margin-left: 0.5rem;
        transition: all 0.2s;
    }

    .nav-links button:hover {
        border-color: var(--pink);
        color: var(--pink);
    }

    .search-container {
        max-width: 700px;
        margin: 4rem auto;
        padding: 0 2rem;
    }

    .search-title {
        font-family: 'Syne', sans-serif;
        font-size: 2.5rem;
        margin-bottom: 2rem;
        background: linear-gradient(135deg, var(--text), var(--muted));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .search-bar {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
    }

    .search-bar .input {
        margin-bottom: 0;
    }

    .search-bar .btn-primary {
        width: auto;
        padding: 0.875rem 2rem;
        white-space: nowrap;
    }

    .track-card {
    background: var(--card);
    border: 1px solid #222;
    border-radius: 12px;
    padding: 1rem 1.5rem;
    margin-bottom: 0.75rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s;
}

.track-card:hover {
    border-color: var(--purple);
    transform: translateX(4px);
}

.track-name {
    font-weight: 500;
    margin-bottom: 0.25rem;
}

.track-artist {
    color: var(--muted);
    font-size: 0.85rem;
}

.track-saved_at {
    color: var(--muted);
    font-size: 0.85rem;
}

.btn-recommend {
    background: none;
    border: 1px solid var(--purple);
    color: var(--purple);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
}

.btn-recommend:hover {
    background: var(--purple);
    color: white;
}
    </style>
</head>
<body>
    <!-- AUTH SCREEN -->
    <div id="auth-screen">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="logo">MusicMe</h1>
            <p class="tagline">discover your next favourite song</p>
        </div>

        <!-- TAB SWITCHER -->
        <div class="auth-tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="login-form">
            <input type="email" id="login-email" placeholder="Email" class="input"/>
            <input type="password" id="login-password" placeholder="Password" class="input"/>
            <button class="btn-primary" onclick="handleLogin()">Login</button>
        </div>

        <!-- REGISTER FORM -->
        <div id="register-form" class="hidden">
            <input type="text" id="reg-username" placeholder="Username" class="input"/>
            <input type="email" id="reg-email" placeholder="Email" class="input"/>
            <input type="password" id="reg-password" placeholder="Password" class="input"/>
            <button class="btn-primary" onclick="handleRegister()">Create Account</button>
        </div>

        <p id="auth-error" class="error hidden"></p>
    </div>
</div>

    <!-- SEARCH SCREEN -->
    <div id="search-screen" class="hidden">
    <nav class="navbar">
        <h2 class="nav-logo">MusicMe</h2>
        <div class="nav-links">
            <button onclick="loadFavourites(); showScreen('favourites-screen')">Favourites</button>
            <button onclick="handleLogout()">Logout</button>
        </div>
    </nav>

    <div class="search-container">
        <h1 class="search-title">What are you feeling?</h1>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search for a song..." class="input"/>
            <button class="btn-primary" onclick="handleSearch()">Search</button>
        </div>
        <div id="search-results"></div>
    </div>
    </div>

    <!-- RECOMMENDATIONS SCREEN -->
    <div id="recommend-screen" class="hidden">
        <nav class="navbar">
            <h2 class="nav-logo">MusicMe</h2>
            <div class="nav-links">
                <button onclick="showScreen('search-screen')">← Back to Search</button>
                <button onclick="loadFavourites(); showScreen('favourites-screen')">Favourites</button>
                <button onclick="handleLogout()">Logout</button>
            </div>
        </nav>
        <div class="search-container">
            <h1 class="search-title">You might also like...</h1>
            <div id="recommend-results"></div>
        </div>
    </div>

    <!-- FAVOURITES SCREEN -->
    <div id="favourites-screen" class="hidden">
        <nav class="navbar">
            <h2 class="nav-logo">MusicMe</h2>
            <div class="nav-links">
                <button onclick="showScreen('search-screen')">← Back to Search</button>
                <button onclick="handleLogout()">Logout</button>
            </div>
        </nav>
        <div class="search-container">
            <h1 class="search-title">Your Favourites</h1>
            <div id="favourites-results"></div>
        </div>
    </div>

    <script>
        let token = null;

        function switchTab(tab) {
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function handleLogin() {
            // get inputs
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            // call api
            const response = await fetch('http://127.0.0.1:8000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            });
            const data = await response.json();
            // save token
            token = data.token;
            console.log(token);
            showScreen('search-screen');
        }

        function showScreen(screenId) {
            document.querySelectorAll('[id$="-screen"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');

            if (screenId === 'search-screen') {
                document.getElementById('search-input').value = '';
                document.getElementById('search-results').innerHTML = '';
            }
        }

        async function handleSearch() {
            // get inputs
            const searchTerm = document.getElementById('search-input').value;
            // call api
            const response = await fetch(`http://127.0.0.1:8000/search?track=${searchTerm}`);
            const data = await response.json();
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = '';

            data.results.forEach(track => {
                resultsDiv.innerHTML += `
                    <div class="track-card" onclick="handleRecommend('${track.name}', '${track.artist}')">
                        <div class="track-info">
                            <p class="track-name">${track.name}</p>
                            <p class="track-artist">${track.artist}</p>
                        </div>
                        <button class="btn-recommend">Recommend →</button>
                    </div>
                `;
            });
        }

        async function handleRegister() {
            // get inputs
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            // call api
            const response = await fetch('http://127.0.0.1:8000/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, email: email, password: password })
            });
            const data = await response.json();
            if (response.ok) {
                switchTab('login');
            } else {
                console.log(data.detail); // shows error like "Email already registered"
            }
        }

        async function handleRecommend(track, artist) {
            try {
                // call api to get 5 recommendations
                const response = await fetch(`http://127.0.0.1:8000/recommend?track=${track}&artist=${artist}`);
                const data = await response.json();

                if (!data.results || data.results.length === 0) {
                    alert('No recommendations found for this track. Try a more popular song!');
                    return;
                }

                // switch screen to recommendations
                showScreen('recommend-screen');
                const resultsDiv = document.getElementById('recommend-results');

                resultsDiv.innerHTML = '';
                data.results.forEach(track => {
                    resultsDiv.innerHTML += `
                        <div class="track-card" onclick="handleFavourite('${track.name}', '${track.artist}')">
                            <div class="track-info">
                                <p class="track-name">${track.name}</p>
                                <p class="track-artist">${track.artist}</p>
                            </div>
                            <button class="btn-recommend">♥ Favourite</button>
                        </div>
                    `;
                });
            } catch (error) {
                alert('Something went wrong. Please try again!');
            }
        }

        async function handleFavourite(track, artist) {
            // call api to add song to favourites
            const response = await fetch(`http://127.0.0.1:8000/favourite`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ track_name: track, artist: artist })
            });
            const data = await response.json();
            alert('Added to favourites! ♥');
        }

        async function loadFavourites() {
            // call api to get list of favourites
            const response = await fetch(`http://127.0.0.1:8000/favourites`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            const resultsDiv = document.getElementById('favourites-results');
            resultsDiv.innerHTML = '';

            data.forEach(track => {
                resultsDiv.innerHTML += `
                    <div class="track-card">
                        <div class="track-info">
                            <p class="track-name">${track.track_name}</p>
                            <p class="track-artist">${track.artist}</p>
                            <p class="track-artist">Saved: ${new Date(track.saved_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                        </div>
                        <button class="btn-recommend" onclick="handleUnfavourite(${track.id})">✕ Remove</button>
                    </div>
                `;
            });
        }

        async function handleUnfavourite(id) {
            const response = await fetch(`http://127.0.0.1:8000/favourite/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            alert('Removed from Favourites');
            loadFavourites();
        }

        function handleLogout() {
            token = null;
            document.getElementById('login-email').value = '';
            document.getElementById('login-password').value = '';
            showScreen('auth-screen');
        }
    </script>
</body>
</html>
<!-- SCREENS:
    1. Login / Register page
    2. Search page - search bar + results
    3. Recommendations page - show similar tracks
    4. Favourites page - saved tracks
-->
